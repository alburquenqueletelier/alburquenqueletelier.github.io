<!DOCTYPE html>
<html lang="en">
    <head>
        <title>My Google Search</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <div class="container">
            <div class="row justify-content-end">
                <div class="col-auto">
                    <a href="imagen_search.html">Imagen</a>
                </div>
                <div class="col-auto">
                    <a href="adv_search.html">Advance Search</a>
                </div>
            </div>
            <div class="row justify-content-center">
                <div class="col mx-auto pt-5">
                    <img src="google_logo.png" class="rounded mx-auto d-block float-sm-none" alt="Logotipo google">
                </div>
            </div>
            <div class="row justify-content-center mt-3">
                <div class="col">
                    <form action="https://google.com/search">
                        <div class="row justify-content-center">
                            <div class="col-6">
                                <input class="form-control rounded-pill m-2" type="text" name="q" required>
                            </div>
                        </div>
                        <div class="row justify-content-center mt-3">
                            <div class="col-auto">
                                <input type="submit" class="form-control rounded-pill" value="Google Search"></button>
                            </div>
                            <div class="col-auto">
                                <input type="submit" class="form-control rounded-pill" name="btnI" value="I’m Feeling Lucky"></button>
                            </div>
                        </div> 
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
